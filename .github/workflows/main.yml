name: Send Emails by Region

on:
  schedule:
    # Singapore → 9 AM SGT (≈ 1 AM UTC)
    - cron: '0 1 * * *'

    # Dubai → 9 AM GST (≈ 5 AM UTC)
    - cron: '0 5 * * *'

jobs:

  singapore:
    if: github.event.schedule == '0 1 * * *'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - run: pip install pandas openpyxl

      - name: Send Singapore Emails
        env:
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
        run: python Apply_code.py singapore


  dubai:
    if: github.event.schedule == '0 5 * * *'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - run: pip install pandas openpyxl

      - name: Send Dubai Emails
        env:
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
        run: python Apply_code.py dubai
