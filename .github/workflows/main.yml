name: Send Emails by Region

on:
  schedule:
    - cron: '15 4 * * 1'   # 
    - cron: '15 0 * * 1'   # 

  workflow_dispatch:   # 👈 ADD THIS LINE

jobs:

  singapore:
    if: github.event.schedule == '15 0 * * 1' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - run: pip install pandas openpyxl

      - name: Send Singapore Emails
        env:
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
        run: python Apply_code.py singapore


  dubai:
    if: github.event.schedule == '15 4 * * 1' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - run: pip install pandas openpyxl

      - name: Send Dubai Emails
        env:
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
        run: python Apply_code.py dubai
